services:
  smtp4dev:
    image: rnwood/smtp4dev:v3
    container_name: core_smtp4dev
    restart: always
    ports:
      - '5000:80'
      - '25:25'
      - '143:143'
    volumes:
      - ./volumes/smtp4dev:/smtp4dev
    environment:
      - ServerOptions__HostName=smtp4dev

  redis:
    image: redis:8.4-bookworm
    container_name: core_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

  redis_worker:
    build: .
    container_name: core_redis_worker
    command: uv run celery -A _0_config worker --loglevel=info -l INFO
    volumes:
      - "./src/core:/app"
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
      - backend

  backend:
    build: .
    container_name: core_backend
    restart: always
    command: uv run manage.py runserver 0.0.0.0:8000
    volumes:
      - "./src/core:/app"
      - /app/.venv
    ports:
      - "8000:8000"
    env_file:
      - "./src/core/.env"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis

  locust_master:
     image: locustio/locust
     container_name: core_locust_master
     ports:
       - "8089:8089"
     volumes:
       - './src/core/_0_utils/locust:/mnt/locust'
     command: -f /mnt/locust/locustfile.py --master -H http://backend:8000

  locust_worker:
     image: locustio/locust
     container_name: core_locust_worker
     volumes:
       - './src/core/_0_utils/locust:/mnt/locust'
     command: -f /mnt/locust/locustfile.py --worker --master-host locust_master
     depends_on:
       - locust_master
