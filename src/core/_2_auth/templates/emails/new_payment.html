<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ dic_language.email }} Confirmation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f7;
            margin: 0;
            padding: 0;
            color: #33475b;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        .header {
            background-color: #161E39;
            padding: 20px;
            text-align: center;
            font-size: 20px;
        }

        .content {
            text-align: start;
            padding: 20px;
        }

        .content img {
            max-width: 100px;
            margin: 20px 0;
        }

        .content h1 {
            font-size: 24px;
            color: #33475b;
        }

        .content p {
            font-size: 16px;
            line-height: 1.5;
            margin: 20px 0;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #99a3ab;
            margin-top: 20px;
        }
        .header_text {
            color: #f0f4f7;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h3 class="header_text">New Payment</h3>
    </div>
    <div class="content">
        <h3>Please Check Payment {{ dic_language.detail }}</h3>
        <h1><span>user mail: </span>{{ user.user.email }}</h1>
        <h1><span>plan: </span>{{ user.plan.title }}</h1>
        <h1><span>network: </span>{{ user.network }}</h1>
        <h1><span>wallet: </span>{{ user.wallet }}</h1>
        <h1><span>datetime: </span>{{ user.datetime }}</h1>
        <h1><span>final price: </span>{{ user.final_price }}</h1>
        <h1><span>txid: </span>{{ user.get_txid }}</h1>
    </div>
</div>
</body>
</html>
