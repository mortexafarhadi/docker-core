<div class="row mx-3 justify-content-between">
    <div class="d-md-flex justify-content-between align-items-center dt-layout-start col-md-auto me-auto mt-0">
        <div class="dt-info" aria-live="polite" id="DataTables_Table_0_info"
             role="status">
            {{ dic_language.showing }} {{ page_obj.start_index }} {{ dic_language.to }} {{ page_obj.end_index }}
            {{ dic_language.of }} {{ paginator.count }}
            {{ dic_language.entries }}
        </div>
    </div>
    <div class="d-md-flex justify-content-between align-items-center dt-layout-end col-md-auto ms-auto gap-md-2 gap-0 mt-0">
        <div class="dt-paging">
            {% if is_paginated %}
                <nav aria-label="Page navigation">
                    <ul class="pagination pagination-primary">
                        <li class="page-item first {% if not page_obj.has_previous %}disabled{% endif %}">
                            <button class="page-link"
                                    {% if page_obj.has_previous %} onclick="set_page(1)" {% endif %}>
                                <i class="icon-base ri ri-skip-back-mini-line icon-22px"></i>
                            </button>
                        </li>
                        <li class="page-item prev {% if not page_obj.has_previous %}disabled{% endif %}">
                            <button class="page-link"
                                    {% if page_obj.has_previous %}
                                    onclick="set_page({{ page_obj.previous_page_number }})" {% endif %}>
                                <i class="icon-base ri ri-arrow-left-s-line icon-22px"></i>
                            </button>
                        </li>
                        {% for page in page_range %}
                            <li class="page-item {% if page == page_obj.number %}active{% endif %}">
                                <button class="page-link" onclick="set_page({{ page }})">{{ page }}</button>
                            </li>
                        {% endfor %}
                        <li class="page-item next {% if not page_obj.has_next %}disabled{% endif %}">
                            <button class="page-link"
                                    {% if page_obj.has_next %}
                                    onclick="set_page({{ page_obj.next_page_number }})" {% endif %}>
                                <i class="icon-base ri ri-arrow-right-s-line icon-22px"></i>
                            </button>
                        </li>
                        <li class="page-item last {% if not page_obj.has_next %}disabled{% endif %}">
                            <button class="page-link"
                                    {% if page_obj.has_next %}
                                    onclick="set_page({{ paginator.num_pages }})" {% endif %}>
                                <i class="icon-base ri ri-skip-forward-mini-line icon-22px"></i>
                            </button>
                        </li>
                    </ul>
                </nav>
            {% endif %}
        </div>
    </div>
</div>
